<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Kart — Cart</title>
  <link rel="stylesheet" href="/style_cart.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="navbar">
    <div class="left">
      <div class="bag_logo"><i class="fa-solid fa-bag-shopping"></i></div>
      <h2>My Kart</h2>
    </div>
    <a href="/work.html" class="back-btn">
      <i class="fa-solid fa-arrow-left"></i> Back to Shop
    </a>
  </div>

  <div class="page-wrapper">

    <div class="left-section">
      <div class="section-title">
        🛒 Cart Items <span id="item-count">0</span>
      </div>

      <div class="cart-panel">
        <div class="cart-panel-header">
          <span class="panel-label">Your Selected Products</span>
          <button class="clear-btn" onclick="clearCart()">
            <i class="fa-solid fa-trash-can"></i> Clear All
          </button>
        </div>
        <div id="cart-items-list">
        </div>
      </div>
    </div>

    <div class="right-section">
      <div class="section-title">📋 Order Summary</div>
      <div class="summary-panel">
        <div class="summary-row">
          <span>Items (<span id="sum-count">0</span>)</span>
          <span class="val" id="sum-subtotal">₹0</span>
        </div>
        <div class="summary-row">
          <span>Delivery</span>
          <span class="free-tag">FREE</span>
        </div>
        <div class="summary-row">
          <span>Discount</span>
          <span class="val discount">- ₹0</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span class="val" id="sum-total">₹0</span>
        </div>
        <button class="checkout-btn" id="checkout-btn" onclick="handleCheckout()">
          <i class="fa-solid fa-lock"></i> Proceed to Checkout
        </button>
        <p class="secure-note">
          <i class="fa-solid fa-shield-halved"></i> 100% Secure &amp; Safe Payment
        </p>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="/cart.js"></script>

</body>
</html>
